<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>webxr-ts</title>
  </head>
  <body>
    <div id="app">
      <a-scene
        xr-mode-ui="XRMode: ar"
        obb-collider="showColliders: false"
        webxr="optionalFeatures: dom-overlay;
           overlayElement: #overlay"
      >
        <a-entity uikit-panel position="0 1.6 -2.5"> </a-entity>
        <a-entity id="ai-container"> </a-entity>

        <a-sky hide-on-enter-ar color="skyblue"></a-sky>
        <a-entity
          x-button-listener
          y-button-listener
          meta-touch-controls="hand: left"
        ></a-entity>
        <a-entity meta-touch-controls="hand: right"></a-entity>
      </a-scene>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
